<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form method="post">
    {% csrf_token %}
    <p>آیا مطمئن هستید که می‌خواهید پست "{{ object.title }}" را برای همیشه پاک کنید؟</p>
    
    <button type="submit" class="btn btn-danger">بله، حذف شود</button>
    <a href="{% url 'blog:post_detail' object.slug %}">خیر، انصراف</a>
</form>
</body>
</html>
