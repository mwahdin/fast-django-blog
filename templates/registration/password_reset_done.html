{% extends 'base.html' %}
{% load static %}

{% block content %}
  <main>
    <div class="container pt-70 pb-300">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
          <div class="text-center">
            <div class="mb-4">
              <svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" fill="currentColor" class="text-success" viewBox="0 0 16 16">
                <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4zm2-.5a.5.5 0 0 0-.276.083L8 7.293l6.276-3.71A.5.5 0 0 0 14 3.5H2zm12 1.151-5.743 3.397a1 1 0 0 1-1.028 0L1.5 4.651V12a.5.5 0 0 0 .5.5h12a.5.5 0 0 0 .5-.5V4.651z" />
              </svg>
            </div>

            <h2 class="mb-3">ایمیل ارسال شد</h2>

            <p class="text-muted mb-4">اگر حساب کاربری مرتبط با این ایمیل وجود داشته باشد، لینک بازیابی رمز عبور برای شما ارسال شده است.</p>

            <p class="text-muted mb-5">لطفاً صندوق ورودی (Inbox) و همچنین پوشه Spam یا Junk را بررسی کنید.</p>

            <a href="{% url 'account:login' %}" class="btn btn-dark button-effect-1">بازگشت به صفحه ورود</a>
          </div>
        </div>
      </div>
    </div>
  </main>
{% endblock %}
